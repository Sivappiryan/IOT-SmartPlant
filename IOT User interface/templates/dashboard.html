<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Smart Plant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="navbar">
        <h1>Welcome, {{ username }}</h1>
        <a href="/logout" class="btn-logout">Logout</a>
    </div>

    <div class="grid-container">
        <div class="card">
            <h3>Temperature</h3>
            <div class="value"><span id="temp">--</span><span class="unit">°C</span></div>
        </div>
        <div class="card">
            <h3>Humidity</h3>
            <div class="value"><span id="hum">--</span><span class="unit">%</span></div>
        </div>
        <div class="card">
            <h3>Tank Distance</h3>
            <div class="value"><span id="dist">--</span><span class="unit">cm</span></div>
            <div id="tank-alert" class="alert">TANK EMPTY!</div>
        </div>
        <div class="card">
            <h3>Light Level</h3>
            <div class="value"><span id="light">--</span><span class="unit">Lux</span></div>
        </div>
    </div>

    <div class="charts-section">
        <div class="charts-header">
            <h2>Environment History</h2>
            <div class="time-filters">
                <button onclick="updateCharts('hour')" class="active" id="btn-hour">Last Hour</button>
                <button onclick="updateCharts('day')" id="btn-day">Last 24h</button>
                <button onclick="updateCharts('week')" id="btn-week">Last Week</button>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-container"><canvas id="tempChart"></canvas></div>
            <div class="chart-container"><canvas id="humChart"></canvas></div>
            <div class="chart-container"><canvas id="lightChart"></canvas></div>
        </div>
    </div>

    <button class="btn-water" onclick="triggerWatering()">Manual Watering</button>

    <div class="status-bar">
        Last Update: <span id="last-update">Waiting...</span>
    </div>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
